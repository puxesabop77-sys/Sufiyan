<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEXUS — Anti Lodge</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020812;font-family:'Rajdhani',sans-serif;color:#c8fff8;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,224,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,224,.04) 1px,transparent 1px);background-size:60px 60px;animation:gm 20s linear infinite}
@keyframes gm{to{background-position:0 60px}}
.o1{position:fixed;width:400px;height:400px;background:rgba(0,255,224,.06);border-radius:50%;filter:blur(80px);top:-120px;left:-120px;animation:of 10s ease-in-out infinite}
.o2{position:fixed;width:300px;height:300px;background:rgba(255,0,170,.05);border-radius:50%;filter:blur(80px);bottom:-80px;right:-80px;animation:of 14s ease-in-out infinite reverse}
@keyframes of{0%,100%{transform:translate(0,0)}50%{transform:translate(24px,-20px)}}
.scan{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);pointer-events:none;z-index:999}

.card{position:relative;z-index:10;width:400px;background:rgba(0,255,224,.03);border:1px solid rgba(0,255,224,.15);padding:44px 36px;backdrop-filter:blur(20px);box-shadow:0 0 60px rgba(0,255,224,.04)}
.card::before,.card::after{content:'';position:absolute;width:18px;height:18px;border-color:#00ffe0;border-style:solid}
.card::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}

.logo{text-align:center;margin-bottom:32px}
.logo-n{font-family:'Orbitron',monospace;font-size:34px;font-weight:900;letter-spacing:10px;color:#00ffe0;text-shadow:0 0 24px rgba(0,255,224,.5);animation:gl 5s infinite}
@keyframes gl{0%,94%,100%{text-shadow:0 0 24px rgba(0,255,224,.5);transform:none}95%{text-shadow:-2px 0 #ff00aa,2px 0 #00ffe0;transform:translateX(2px)}97%{text-shadow:2px 0 #ff00aa,-2px 0 #00ffe0;transform:translateX(-2px)}}
.logo-s{font-size:10px;letter-spacing:4px;color:rgba(200,255,248,.3);margin-top:6px}

.tabs{display:flex;border-bottom:1px solid rgba(0,255,224,.15);margin-bottom:26px}
.tab{flex:1;background:none;border:none;color:rgba(200,255,248,.4);font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;padding:11px;cursor:pointer;position:relative;transition:color .3s}
.tab.on{color:#00ffe0}
.tab.on::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:#00ffe0;box-shadow:0 0 8px #00ffe0}

.alert{padding:9px 13px;font-size:12px;letter-spacing:1px;margin-bottom:16px;display:none;border-radius:1px}
.alert.e{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.35);color:#ff4d6d}
.alert.s{background:rgba(0,255,224,.06);border:1px solid rgba(0,255,224,.3);color:#00ffe0}
.alert.w{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.3);color:#f59e0b}
.alert.on{display:block}

.fg{margin-bottom:16px}
.fg label{display:block;font-size:10px;letter-spacing:3px;color:rgba(200,255,248,.35);margin-bottom:7px}
.iw{position:relative}
.iw .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.pfx{position:absolute;left:40px;top:50%;transform:translateY(-50%);color:#00ffe0;font-size:14px;pointer-events:none}
input[type=tel],input[type=password],input[type=text]{width:100%;background:rgba(0,255,224,.025);border:1px solid rgba(0,255,224,.15);color:#c8fff8;font-family:'Rajdhani',sans-serif;font-size:16px;padding:12px 13px 12px 40px;outline:none;transition:all .3s;letter-spacing:1px}
.phone-inp{padding-left:78px !important}
input:focus{border-color:#00ffe0;background:rgba(0,255,224,.05);box-shadow:0 0 18px rgba(0,255,224,.07)}
input::placeholder{color:rgba(200,255,248,.18)}
.eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);cursor:pointer;color:rgba(200,255,248,.35);font-size:15px;background:none;border:none}

/* OTP boxes */
.otp-row{display:flex;gap:8px;justify-content:center}
.otp-box{width:48px;height:52px;background:rgba(0,255,224,.025);border:1px solid rgba(0,255,224,.15);color:#00ffe0;font-family:'Orbitron',monospace;font-size:20px;text-align:center;outline:none;transition:all .3s;letter-spacing:0;padding:0}
.otp-box:focus{border-color:#00ffe0;background:rgba(0,255,224,.07);box-shadow:0 0 14px rgba(0,255,224,.1)}

/* Timer */
.timer{text-align:center;font-size:11px;letter-spacing:2px;color:rgba(200,255,248,.35);margin-top:10px}
.timer .nt{color:#00ffe0;font-family:'Orbitron',monospace}
.resend{color:#00ffe0;cursor:pointer;letter-spacing:2px;font-size:11px}

.btn{width:100%;padding:14px;background:transparent;border:1px solid #00ffe0;color:#00ffe0;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:4px;cursor:pointer;position:relative;overflow:hidden;transition:all .3s;margin-top:6px}
.btn::before{content:'';position:absolute;inset:0;background:#00ffe0;transform:translateX(-101%);transition:transform .3s;z-index:0}
.btn:hover::before{transform:translateX(0)}
.btn:hover{color:#020812;box-shadow:0 0 28px rgba(0,255,224,.25)}
.btn span{position:relative;z-index:1}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn:disabled::before{display:none}
.ld{display:none;width:14px;height:14px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:sp .6s linear infinite;margin:0 auto;position:relative;z-index:1}
@keyframes sp{to{transform:rotate(360deg)}}
.btn.loading .btn-t{display:none}
.btn.loading .ld{display:block}
.btn-ghost{background:rgba(0,255,224,.04);border-color:rgba(0,255,224,.25);color:rgba(200,255,248,.4);font-size:10px;letter-spacing:2px;padding:10px;margin-top:6px}
.btn-ghost:hover{color:#020812}

/* Steps */
.steps{display:flex;align-items:center;justify-content:center;margin-bottom:22px}
.sd{width:26px;height:26px;border-radius:50%;border:1px solid rgba(0,255,224,.2);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:10px;color:rgba(200,255,248,.3);transition:all .4s}
.sd.on{border-color:#00ffe0;color:#00ffe0;box-shadow:0 0 10px rgba(0,255,224,.3)}
.sd.dn{background:rgba(0,255,224,.12);border-color:#00ffe0;color:#00ffe0}
.sl{flex:1;height:1px;background:rgba(0,255,224,.1);max-width:44px;transition:background .4s}
.sl.on{background:#00ffe0;box-shadow:0 0 6px #00ffe0}

/* Phase animation */
.ph{display:none;animation:pin .45s cubic-bezier(.16,1,.3,1) both}
.ph.on{display:block}
@keyframes pin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

.note{text-align:center;font-size:11px;letter-spacing:1px;color:rgba(200,255,248,.3);margin-top:14px}
.note a{color:#00ffe0;cursor:pointer}

@media(max-width:440px){.card{width:calc(100vw - 16px);padding:32px 20px}.logo-n{font-size:26px;letter-spacing:6px}.otp-box{width:40px;height:46px;font-size:17px}}
</style>
</head>
<body>
<div class="grid"></div>
<div class="o1"></div><div class="o2"></div>
<div class="scan"></div>

<div class="card">
  <div class="logo">
    <div class="logo-n">NEXUS</div>
    <div class="logo-s">ANTI LODGE PORTAL</div>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="sw('up',this)">SIGN UP</button>
    <button class="tab" onclick="sw('in',this)">SIGN IN</button>
  </div>

  <div class="alert" id="al"></div>

  <!-- ══ SIGN UP ══ -->
  <div id="up">
    <!-- Steps -->
    <div class="steps" id="stps">
      <div class="sd on" id="s1">1</div>
      <div class="sl" id="l1"></div>
      <div class="sd" id="s2">2</div>
      <div class="sl" id="l2"></div>
      <div class="sd" id="s3">3</div>
    </div>

    <!-- Phase 1: Phone -->
    <div class="ph on" id="p1">
      <div class="fg">
        <label>MOBILE NUMBER</label>
        <div class="iw">
          <span class="ic">📱</span>
          <span class="pfx">+91</span>
          <input type="tel" id="up_ph" class="phone-inp" maxlength="10" placeholder="XXXXXXXXXX" oninput="this.value=this.value.replace(/\D/g,'')" onkeydown="if(event.key==='Enter')sendOTP()">
        </div>
      </div>
      <button class="btn" id="otpBtn" onclick="sendOTP()">
        <div class="ld"></div><span class="btn-t">SEND OTP →</span>
      </button>
    </div>

    <!-- Phase 2: OTP -->
    <div class="ph" id="p2">
      <div class="fg">
        <label style="text-align:center;display:block">VERIFICATION CODE</label>
        <div class="otp-row" id="otpRow">
          <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
        </div>
        <div class="timer" id="tmr"></div>
      </div>
      <button class="btn" id="vrfBtn" onclick="verifyOTP()">
        <div class="ld"></div><span class="btn-t">VERIFY →</span>
      </button>
      <button class="btn btn-ghost" onclick="goP(1)"><span>← BACK</span></button>
    </div>

    <!-- Phase 3: Password -->
    <div class="ph" id="p3">
      <div class="fg">
        <label>PASSWORD</label>
        <div class="iw">
          <span class="ic">🔐</span>
          <input type="password" id="up_pw" placeholder="MIN 6 CHARACTERS" onkeydown="if(event.key==='Enter')document.getElementById('up_cp').focus()">
          <button class="eye" onclick="tp('up_pw',this)" type="button">👁</button>
        </div>
      </div>
      <div class="fg">
        <label>CONFIRM PASSWORD</label>
        <div class="iw">
          <span class="ic">🔑</span>
          <input type="password" id="up_cp" placeholder="REPEAT PASSWORD" onkeydown="if(event.key==='Enter')doSignup()">
          <button class="eye" onclick="tp('up_cp',this)" type="button">👁</button>
        </div>
      </div>
      <button class="btn" id="regBtn" onclick="doSignup()">
        <div class="ld"></div><span class="btn-t">CREATE ACCOUNT ⚡</span>
      </button>
    </div>
  </div>

  <!-- ══ SIGN IN ══ -->
  <div id="in" style="display:none">
    <div class="fg">
      <label>MOBILE NUMBER</label>
      <div class="iw">
        <span class="ic">📱</span>
        <span class="pfx">+91</span>
        <input type="tel" id="in_ph" class="phone-inp" maxlength="10" placeholder="XXXXXXXXXX" oninput="this.value=this.value.replace(/\D/g,'')">
      </div>
    </div>
    <div class="fg">
      <label>PASSWORD</label>
      <div class="iw">
        <span class="ic">🔐</span>
        <input type="password" id="in_pw" placeholder="YOUR PASSWORD" onkeydown="if(event.key==='Enter')doSignin()">
        <button class="eye" onclick="tp('in_pw',this)" type="button">👁</button>
      </div>
    </div>
    <button class="btn" id="inBtn" onclick="doSignin()">
      <div class="ld"></div><span class="btn-t">ACCESS PORTAL →</span>
    </button>
    <div class="note">New here? <a onclick="sw('up',document.querySelectorAll('.tab')[0])">Create Account</a></div>
  </div>
</div>

<script>
const UKEY = 'nx_users';
const DEST = '/antilodge';
const TF_KEY = '';  // Set your 2Factor.in API key here OR use Vercel env via /api/send-otp

let curPhone = '', sessionId = '', timerT = null;

// ── STORAGE ───────────────────────────────────────────────
const getU = () => { try { return JSON.parse(localStorage.getItem(UKEY)||'{}') } catch { return {} } };
const saveU = u => localStorage.setItem(UKEY, JSON.stringify(u));

// ── ALERT ─────────────────────────────────────────────────
function al2(msg, type) {
  const el = document.getElementById('al');
  el.textContent = msg; el.className = 'alert ' + type + ' on';
  if (type !== 'w') setTimeout(() => el.className = 'alert', 3500);
}
const clr = () => document.getElementById('al').className = 'alert';

// ── LOAD ──────────────────────────────────────────────────
function setL(id, v) { const b = document.getElementById(id); b.classList.toggle('loading', v); b.disabled = v; }

// ── HASH ──────────────────────────────────────────────────
async function hash(pw) {
  const b = new TextEncoder().encode(pw + 'NX_AL_2026');
  const h = await crypto.subtle.digest('SHA-256', b);
  return Array.from(new Uint8Array(h)).map(x => x.toString(16).padStart(2,'0')).join('');
}

// ── OTP INPUTS ────────────────────────────────────────────
document.querySelectorAll('.otp-box').forEach((inp, i, all) => {
  inp.addEventListener('input', () => {
    inp.value = inp.value.replace(/\D/g, '');
    if (inp.value && i < 5) all[i+1].focus();
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !inp.value && i > 0) all[i-1].focus();
    if (e.key === 'Enter') verifyOTP();
  });
  inp.addEventListener('paste', e => {
    e.preventDefault();
    const t = e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);
    t.split('').forEach((ch, j) => { if (all[i+j]) all[i+j].value = ch; });
    const focus = all[Math.min(i + t.length, 5)];
    if (focus) focus.focus();
  });
});

// ── SEND OTP ──────────────────────────────────────────────
async function sendOTP() {
  clr();
  const ph = document.getElementById('up_ph').value.trim();
  if (!/^\d{10}$/.test(ph)) { al2('Enter valid 10-digit number', 'e'); return; }

  // Check duplicate locally first (fast)
  const users = getU();
  if (users[ph]) {
    al2('Number already registered — Sign In instead', 'w');
    setTimeout(() => { sw('in', document.querySelectorAll('.tab')[1]); document.getElementById('in_ph').value = ph; clr(); }, 1400);
    return;
  }

  setL('otpBtn', true);
  curPhone = ph;

  try {
    // Direct 2Factor.in call — no backend needed
    const res = await fetch(
      'https://2factor.in/API/V1/66292569-15f4-11f1-bcb0-0200cd936042/SMS/+91' + ph + '/AUTOGEN',
      { method: 'GET' }
    );
    const d = await res.json();

    if (d.Status === 'Success') {
      sessionId = d.Details;
      al2('OTP sent to +91 ' + ph, 's');
      goP(2);
      startTimer();
    } else {
      al2(d.Details || 'Failed to send OTP — try again', 'e');
    }
  } catch (err) {
    al2('Failed to send OTP — check connection', 'e');
  }
  setL('otpBtn', false);
}

// ── VERIFY OTP ────────────────────────────────────────────
async function verifyOTP() {
  clr();
  const otp = Array.from(document.querySelectorAll('.otp-box')).map(i => i.value).join('');
  if (otp.length < 6) { al2('Enter the complete 6-digit OTP', 'e'); return; }
  setL('vrfBtn', true);

  try {
    // Direct 2Factor.in verify — no backend needed
    const res = await fetch(
      'https://2factor.in/API/V1/66292569-15f4-11f1-bcb0-0200cd936042/SMS/VERIFY/' + sessionId + '/' + otp,
      { method: 'GET' }
    );
    const d = await res.json();

    if (d.Status === 'Success' && d.Details === 'OTP Matched') {
      clearInterval(timerT);
      clr();
      goP(3);
      document.getElementById('up_pw').focus();
    } else {
      al2('Incorrect OTP — try again', 'e');
      document.querySelectorAll('.otp-box').forEach(i => { i.value = ''; i.style.borderColor = '#ff4d6d'; });
      document.querySelector('.otp-box').focus();
      setTimeout(() => document.querySelectorAll('.otp-box').forEach(i => i.style.borderColor = ''), 1200);
    }
  } catch (err) {
    al2('Failed to verify — check connection', 'e');
  }
  setL('vrfBtn', false);
}

// ── CREATE ACCOUNT ────────────────────────────────────────
async function doSignup() {
  clr();
  const pw = document.getElementById('up_pw').value;
  const cp = document.getElementById('up_cp').value;
  if (pw.length < 6) { al2('Password must be at least 6 characters', 'e'); return; }
  if (pw !== cp) { al2('Passwords do not match', 'e'); return; }
  setL('regBtn', true);

  // Final duplicate guard
  const users = getU();
  if (users[curPhone]) {
    al2('Number already registered — Sign In instead', 'w');
    setL('regBtn', false);
    return;
  }
  const h = await hash(pw);
  users[curPhone] = { h, at: Date.now() };
  saveU(users);
  al2('Account created! Redirecting...', 's');
  setTimeout(() => window.location.href = DEST, 1200);
}

// ── SIGN IN ───────────────────────────────────────────────
async function doSignin() {
  clr();
  const ph = document.getElementById('in_ph').value.trim();
  const pw = document.getElementById('in_pw').value;
  if (!/^\d{10}$/.test(ph)) { al2('Enter valid 10-digit number', 'e'); return; }
  if (!pw) { al2('Enter your password', 'e'); return; }
  setL('inBtn', true);
  const users = getU();
  if (!users[ph]) { al2('No account found — Sign Up first', 'e'); setL('inBtn', false); return; }
  const h = await hash(pw);
  if (h === users[ph].h) {
    al2('Access granted!', 's');
    setTimeout(() => window.location.href = DEST, 800);
  } else {
    al2('Incorrect password', 'e');
    setL('inBtn', false);
  }
}

// ── TIMER ─────────────────────────────────────────────────
function startTimer() {
  let sec = 60;
  const box = document.getElementById('tmr');
  box.innerHTML = `Resend in <span class="nt">${sec}s</span>`;
  if (timerT) clearInterval(timerT);
  timerT = setInterval(() => {
    sec--;
    const s = box.querySelector('.nt');
    if (s) s.textContent = sec + 's';
    if (sec <= 0) {
      clearInterval(timerT);
      box.innerHTML = `<span class="resend" onclick="goP(1)">↺ RESEND OTP</span>`;
    }
  }, 1000);
}

// ── PHASE NAV ─────────────────────────────────────────────
function goP(n) {
  [1,2,3].forEach(i => document.getElementById('p'+i).classList.toggle('on', i===n));
  [1,2,3].forEach(i => {
    const d = document.getElementById('s'+i);
    d.className = 'sd' + (i < n ? ' dn' : i === n ? ' on' : '');
  });
  document.getElementById('l1').className = 'sl' + (n > 1 ? ' on' : '');
  document.getElementById('l2').className = 'sl' + (n > 2 ? ' on' : '');
}

// ── SWITCH TAB ────────────────────────────────────────────
function sw(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('up').style.display = tab === 'up' ? 'block' : 'none';
  document.getElementById('in').style.display = tab === 'in' ? 'block' : 'none';
  clr();
  if (tab === 'up') goP(1);
}

// ── TOGGLE PASS ───────────────────────────────────────────
function tp(id, btn) {
  const i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
  btn.textContent = i.type === 'password' ? '👁' : '🙈';
}
</script>
</body>
</html>
